<!DOCTYPE html>
<html lang="en">
  
<head>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div style="display: flex; justify-content: space-between; padding:0px  100px;">
    <div id="response">
      Loading..,
    </div>
    <div>
      <input type="text" id="note">
      <button onclick="add()">Create new note</button>
    </div>
  </div>
<script>

  async function getTodos(){
    const response=await axios.get("http://localhost:3000/notes");
    const notes=response.data.notes;
    document.getElementById("response").innerHTML="";
    for(let i=0;i<notes.length;i++){
      const noteNote=document.createElement("div");
      noteNote.innerHTML=notes[i];
      noteNote.setAttribute("style","border:2px solid black;padding:10px;margin:10px;")
      document.getElementById("response").appendChild(noteNote);
     }
  }
  async function add(){
    const note=document.getElementById("note").value;
    const response=await axios.post("http://localhost:3000/notes",{
      note:note
    });
    const noteNote=document.createElement("div");
    noteNote.innerHTML=note;
    noteNote.setAttribute("style","border:2px solid black;padding:10px;margin:10px")
    document.getElementById("response").appendChild(noteNote);
    document.getElementById("note").value="";

  }
  getTodos();
</script>
</body>
</html>
